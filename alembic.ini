# =============================================================================
# Alembic Configuration — MagicPic Backend
# =============================================================================
# The database URL is NOT set here. It is read from config.properties /
# environment variables inside alembic/env.py via app.core.config.settings.
# Do NOT hard-code credentials in this file.
# =============================================================================

[alembic]
# Location of the migration scripts directory (created by `alembic init alembic`)
script_location = alembic

# Migration file naming: timestamp + revision id + slug
# Example output: 20260429_1423-0a1b2c3d_add_user_avatar.py
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d-%%(rev)s_%%(slug)s

# Project root is on sys.path so `from app.core.config import settings` works
prepend_sys_path = .

# Truncate the slug portion of the filename to 40 characters
truncate_slug_length = 40

# sqlalchemy.url is intentionally left blank — it is set programmatically
# inside alembic/env.py using app.core.config.settings.DATABASE_URL
sqlalchemy.url =


# =============================================================================
# Logging
# =============================================================================
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
